<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Auditoria</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-4">Nova Auditoria</h2>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Área</label>

                    <select name="area" class="form-select" required>
                        <option>Acabamento C4</option>
                        <option>Inspeção Final C4</option>
                        <option>Tratamento Térmico C4</option>
                        <option>Tratamento Térmico Blocos</option>
                        <option>Pré-acabamento C4</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nota (%)</label>

                    <input type="number" step="0.1" name="nota" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Observação</label>

                    <textarea name="observacao" class="form-control"></textarea>
                </div>

                <button type="submit" class="btn btn-success">
                    Salvar Auditoria
                </button>

                <a href="/" class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
